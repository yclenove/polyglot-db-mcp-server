name: CI

# actions/checkout@v6、actions/setup-node@v6 基于 Node 24，避免官方 Action 仍 targeting Node 20 的弃用告警：
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
